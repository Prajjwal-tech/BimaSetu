version: '3.9'

services:
  backend:
    build: ./backend
    container_name: bimasetu-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - bimasetu_static:/app/static
      - bimasetu_db:/app/data
    environment:
      - DB_PATH=/app/data/bimasetu.db
      - BASE_URL=http://localhost:8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:20-alpine
    container_name: bimasetu-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  bimasetu_static:
  bimasetu_db:
