services:
  - type: web
    name: bimasetu-backend
    runtime: python

    rootDir: backend

    buildCommand: |
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

      - key: PORT
        value: 10000

      - key: WEB_CONCURRENCY
        value: 1