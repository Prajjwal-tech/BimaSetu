name: BimaSetu CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend tests & lint ─────────────────────────────────────────
  backend:
    name: Backend — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Install without heavy ML deps for CI speed
          pip install fastapi uvicorn python-multipart reportlab \
                      python-dotenv numpy Pillow opencv-python-headless aiofiles

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --ignore E501 || true

      - name: Run startup smoke test
        run: |
          cp .env.example .env
          python -c "
          import sys, os
          os.environ['DB_PATH'] = ':memory:'
          from database import init_db
          init_db()
          print('DB init OK')
          from pdf.generator import generate_claim_pdf
          print('PDF module import OK')
          print('All smoke tests passed')
          "

  # ── Frontend build ───────────────────────────────────────────────
  frontend:
    name: Frontend — Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env for build
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=placeholder
          VITE_FIREBASE_AUTH_DOMAIN=placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=placeholder
          VITE_FIREBASE_STORAGE_BUCKET=placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID=000000000000
          VITE_FIREBASE_APP_ID=1:000000000000:web:placeholder
          VITE_BACKEND_URL=http://localhost:8000
          EOF

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Docker build (main branch only) ─────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: bimasetu-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
